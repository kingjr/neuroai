# Classical oscillatory / motor-imagery classification baseline:
# Covariances(oas) + TangentSpace(riemann) + StandardScaler + LogisticRegressionCV.
# Mirrors moabb's TSLR.yml pipeline
# (https://github.com/NeuroTechX/moabb/blob/develop/pipelines/TSLR.yml)
#
brain_model_name: cov_ts_lr
eval_only: true
brain_model_config:
  =replace=: true
  name: CovTsLR
  cov_estimator: oas
  ts_metric: riemann
# See ``cov_ts_ridge.yaml`` for rationale: covariance-based pipelines
# require full-rank PD per-trial covariances; hard clipping at the
# extractor can collapse saturated trials to rank-1 and crash
# ``TangentSpace.logm``.
data:
  neuro:
    clamp: null
trainer_config:
  n_epochs: 1
  limit_train_batches: 1
lightning_optimizer_config:
  optimizer:
    lr: 0.0
  scheduler: null
