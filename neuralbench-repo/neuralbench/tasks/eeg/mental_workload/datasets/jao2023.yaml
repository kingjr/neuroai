data:
  study:
    source:
      name: Jao2023Eeg
    # Disable the parent's Hinss2023Open-specific `filter_task` step
    filter_task:
      query: null
    merge_easy:
      name: CreateColumn
      column: difficulty
      query_row: "code == 0"
      query_value: 0
    merge_hard:
      name: CreateColumn
      column: difficulty
      query_row: "code.isin([1, 2])"
      query_value: 1
      on_column_exists: ignore
  target:
    =replace=: true
    name: LabelEncoder
    event_types: Stimulus
    event_field: difficulty
    return_one_hot: true
    aggregation: trigger
  trigger_event_type: Stimulus
  start: 0.0
  duration: 2.0
  stride: 1.0
  stride_drop_incomplete: true
  summary_columns: [difficulty]
brain_model_output_size: &brain_model_output_size 2
metrics: !!python/object/apply:neuralbench.defaults.metrics.get_classification_metric_configs
  - *brain_model_output_size
