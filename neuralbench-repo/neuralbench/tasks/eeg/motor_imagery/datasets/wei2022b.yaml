data:
  study:
    source:
      name: Wei2022BeetlB
    # Drop the ``rest`` class that is absent from run "1finaltest", so
    # train/val/test all share the same 3-class label space. Eeg rows are
    # preserved.
    drop_rest:
      name: QueryEvents
      query: "~((type == 'Stimulus') & (code == 3))"
    split:
      =replace=: true
      name: PredefinedSplit
      test_split_query: "run == '1finaltest'"
      # Only 2 train timelines (one per subject); ``valid_split_by:
      # timeline`` would put a whole subject in val and leave exactly one
      # for train. Split validation as a random sample of training events
      # instead.
      valid_split_by: _index
      valid_split_ratio: 0.2
      valid_random_state: 33
brain_model_output_size: &brain_model_output_size 3
metrics: !!python/object/apply:neuralbench.defaults.metrics.get_classification_metric_configs
  - *brain_model_output_size
