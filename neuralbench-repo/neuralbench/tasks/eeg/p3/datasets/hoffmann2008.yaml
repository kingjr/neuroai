data:
  study:
    source:
      name: Hoffmann2008Efficient
    split:
      =replace=: true
      # EPFLP300 (Hoffmann2008): 8 subjects, 4 sessions per subject,
      # 6 runs per session.  Too few subjects for a cross-subject split
      # (<10), so we use a within-subject, session-level temporal hold-out:
      # session 3 is the test set (the last recorded session), one of the
      # remaining three sessions becomes validation (~33% of train), and
      # the other two sessions are training.  No session appears in more
      # than one split.
      name: PredefinedSplit
      test_split_query: "session == '3'"
      col_name: split
      valid_split_by: session
      valid_split_ratio: 0.334  # 1 of 3 remaining sessions
      valid_random_state: 33
  neuro.baseline: [0.0, 0.2]
  start: -0.2
  duration: 1.0
