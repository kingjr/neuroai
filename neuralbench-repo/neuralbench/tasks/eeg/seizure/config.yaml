data:
  study:
    source:
      name: Dan2023Bids
    split:
      name: SklearnSplit
      split_by: subject
      valid_split_ratio: 0.2
      test_split_ratio: 0.2
      valid_random_state: 33
      test_random_state: 33
      stratify_by: state
  channel_positions:
    layout_or_montage_name: standard_1005
  target:
    =replace=: true
    name: LabelEncoder
    event_types: Seizure
    event_field: state
    return_one_hot: true
    aggregation: sum
    allow_missing: true
    treat_missing_as_separate_class: true
  trigger_event_type: Eeg
  start: 0.0
  duration: 5.0
  stride: 5.0
  stride_drop_incomplete: true
  use_weighted_sampler: true
  summary_columns: [state]
compute_class_weights: false
brain_model_output_size: &brain_model_output_size 2
trainer_config.monitor: val/bal_acc
trainer_config.mode: max
loss:
  name: CrossEntropyLoss
  kwargs:
    label_smoothing: 0.1
metrics: !!python/object/apply:neuralbench.defaults.metrics.get_classification_metric_configs
  - *brain_model_output_size
test_full_metrics:
  - log_name: acc
    name: Accuracy
    kwargs:
      task: multiclass
      num_classes: *brain_model_output_size
  - log_name: bal_acc
    name: Accuracy
    kwargs:
      task: multiclass
      num_classes: *brain_model_output_size
      average: macro
  - log_name: auroc
    name: AUROC
    kwargs:
      task: multiclass
      num_classes: *brain_model_output_size
