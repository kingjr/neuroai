name: Setup Python environment
description: >
  Shared composite action that installs uv, creates a .venv, restores caches,
  and installs all packages (neuralset, neuralfetch, neuraltrain, neuralbench)
  editable. All packages live under <pkg>-repo/.

inputs:
  restore-data-caches:
    description: >
      Whether to restore HuggingFace, TorchHub, and neuralset data caches.
      Set to 'false' for jobs that only need the env (e.g. mypy).
    required: false
    default: 'true'

outputs:
  data-cache-hit:
    description: Whether the data cache (HF / Torch / neuralset / MNE) was restored.
    value: ${{ steps.data-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Set cache config
      shell: bash
      run: |
        MONTH=$(date +%Y-%m)
        {
          echo "MONTH=$MONTH"
          echo "DATA_CACHE_KEY=data-v1-$MONTH"
          echo "DATA_CACHE_PATH<<EOF"
          echo "~/.cache/huggingface"
          echo "~/.cache/torch/hub"
          echo "~/.cache/neuralset"
          echo "~/.mne"
          echo "EOF"
        } >> "$GITHUB_ENV"

    # ── .venv cache ──────────────────────────────────────────
    # One cache entry per month (~5-6 GB, includes ~1 GB spacy models).
    # Monthly rotation keeps dependencies reasonably fresh without
    # per-commit cache churn. Uses explicit restore + save so the
    # multi-GB upload runs as a visible mid-job step instead of in
    # post-job cleanup (which cancel-in-progress can kill).
    - name: Restore .venv
      id: cache-venv
      uses: actions/cache/restore@v4
      with:
        path: ./.venv
        key: venv-v1-${{ env.MONTH }}-main

    - name: Create .venv (on cache miss)
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      # --seed installs pip into the venv so `python -m spacy download`
      # works (spacy invokes pip internally to fetch model wheels).
      run: uv venv --python 3.12 --seed .venv

    - name: Install / sync packages
      shell: bash
      # All editables in a single resolution pass. transformers pinned
      # because neuralset's tests target 4.41.0 (pyproject leaves it open).
      run: |
        source .venv/bin/activate
        uv pip install \
          --config-settings editable_mode=strict \
          -e neuralset-repo/.[dev,all] \
          -e neuralfetch-repo/. \
          -e neuraltrain-repo/.[lightning,dev,models,metrics] \
          -e neuralbench-repo/.[dev,wandb,models] \
          'transformers==4.41.0'

    - name: Download spacy models (on cache miss)
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      # ~560 MB each. Pre-installed to avoid flaky runtime
      # downloads from GitHub.
      run: |
        source .venv/bin/activate
        python -m spacy download en_core_web_lg
        python -m spacy download fr_core_news_lg

    # all jobs install the same packages, so the cache-key race is benign
    - name: Save .venv cache (main only)
      if: steps.cache-venv.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
      uses: actions/cache/save@v4
      with:
        path: ./.venv
        key: venv-v1-${{ env.MONTH }}-main

    - name: Print installed packages
      shell: bash
      run: |
        source .venv/bin/activate
        uv pip freeze

    # ── Data / model caches ──────────────────────────────────
    # Save only in test-neuralset (see ci.yml): otherwise a sparse
    # early job first-write-wins an empty cache for the month.
    - name: Restore data cache
      if: inputs.restore-data-caches == 'true'
      id: data-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.DATA_CACHE_PATH }}
        key: ${{ env.DATA_CACHE_KEY }}

    - name: Print cache sizes
      if: inputs.restore-data-caches == 'true'
      shell: bash
      run: |
        du -h -d 1 ~/.cache/neuralset || true
        du -h -d 2 ~/.cache/huggingface || true
        du -h -d 2 ~/.cache/torch || true
