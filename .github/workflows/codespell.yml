# Codespell configuration is within pyproject.toml
---
name: Codespell

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # keep codespell version in sync with .pre-commit-config.yaml
      - name: Install codespell
        run: pip install 'codespell[toml]==2.4.1'
      - name: Codespell
        run: codespell --toml pyproject.toml
